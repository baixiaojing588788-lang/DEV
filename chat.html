<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
      background: #fff;
      color: #000;
    }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* 顶部标题栏：头像 + 名字，可拖动窗口 */
    .header {
      -webkit-app-region: drag;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 56px;
      padding-top: 6px;            /* 给 Mac 红绿灯按钮留空间 */
      border-bottom: 1px solid #e5e5e5;
      background: rgba(250, 250, 250, 0.9);
      backdrop-filter: blur(10px);
    }
    .header img {
      width: 28px;
      height: 28px;
      image-rendering: pixelated;
    }
    .header .name { font-size: 15px; font-weight: 600; }

    /* 消息区 */
    .messages {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #fff;
    }

    .row { display: flex; }
    .row.me { justify-content: flex-end; }
    .row.pet { justify-content: flex-start; }

    .bubble {
      max-width: 72%;
      padding: 8px 12px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.35;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .me .bubble {
      background: #0b93f6;          /* iMessage 蓝 */
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .pet .bubble {
      background: #e9e9eb;          /* iMessage 灰 */
      color: #000;
      border-bottom-left-radius: 4px;
    }
    .pet .bubble.error { background: #ffe2e2; color: #b00020; }

    /* 头像右侧的设置按钮 */
    .gear {
      -webkit-app-region: no-drag;
      position: absolute; right: 12px;
      border: none; background: none; cursor: pointer;
      font-size: 16px; opacity: 0.6;
    }
    .gear:hover { opacity: 1; }

    /* 正在输入的小圆点 */
    .typing { display: flex; gap: 3px; align-items: center; padding: 10px 12px; }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%; background: #9a9a9f;
      animation: blink 1.2s infinite both;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }

    /* 底部输入栏 */
    .composer {
      flex: 0 0 auto;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      padding: 10px 12px;
      border-top: 1px solid #e5e5e5;
      background: #fafafa;
    }
    #input {
      flex: 1 1 auto;
      resize: none;
      max-height: 100px;
      min-height: 36px;
      padding: 8px 12px;
      font-size: 15px;
      font-family: inherit;
      border: 1px solid #d0d0d5;
      border-radius: 18px;
      outline: none;
    }
    #input:focus { border-color: #0b93f6; }
    #send {
      flex: 0 0 auto;
      width: 36px; height: 36px;
      border: none; border-radius: 50%;
      background: #0b93f6; color: #fff;
      font-size: 18px; cursor: pointer;
    }
    #send:disabled { background: #c4c4c9; cursor: default; }
  </style>
</head>
<body>
  <div class="header">
    <img src="assets/little-mao-puppy/frames/wave/01.png" alt="" />
    <span class="name">小鸡毛</span>
    <button class="gear" id="gear" title="设置">⚙</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="composer">
    <textarea id="input" rows="1" placeholder="发消息…"></textarea>
    <button id="send">↑</button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    // 给桌宠一点性格
    const SYSTEM = {
      role: 'system',
      content: '你是一只可爱的桌面宠物小狗，名叫“小鸡毛”。用简短、亲切、口语化的中文回复，偶尔俏皮一点。',
    };
    let history = [SYSTEM];

    function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

    // 创建一个气泡，返回 .bubble 元素；dots=true 时先显示等待中的小圆点
    function addBubble(who, text, dots) {
      const row = document.createElement('div');
      row.className = 'row ' + who;
      const b = document.createElement('div');
      b.className = 'bubble';
      if (dots) {
        b.classList.add('typing');
        b.innerHTML = '<span></span><span></span><span></span>';
      } else {
        b.textContent = text || '';
      }
      row.appendChild(b);
      messagesEl.appendChild(row);
      scrollToBottom();
      return b;
    }

    // ---- 打字机：逐字把收到的内容显示出来 ----
    let typingTimer = null;
    let pending = '';       // 待显示的字符
    let liveBubble = null;  // 当前正在打字的气泡
    let liveText = '';      // 已显示的文本
    let streamEnded = false;

    function startTypewriter() {
      if (typingTimer) return;
      typingTimer = setInterval(() => {
        if (pending.length > 0) {
          liveText += pending[0];
          pending = pending.slice(1);
          liveBubble.classList.remove('typing');
          liveBubble.textContent = liveText;   // 第一个字会自动清掉小圆点
          scrollToBottom();
        } else if (streamEnded) {
          clearInterval(typingTimer);
          typingTimer = null;
          history.push({ role: 'assistant', content: liveText });
          liveBubble = null;
          setBusy(false);
        }
      }, 18);
    }

    function setBusy(busy) {
      input.disabled = busy;
      sendBtn.disabled = busy;
      if (!busy) input.focus();
    }

    function send() {
      const text = input.value.trim();
      if (!text || sendBtn.disabled) return;

      addBubble('me', text);
      history.push({ role: 'user', content: text });
      input.value = '';
      input.style.height = 'auto';
      setBusy(true);

      // 准备打字目标气泡（先显示等待小圆点）
      liveBubble = addBubble('pet', '', true);
      liveText = '';
      pending = '';
      streamEnded = false;

      window.chatAPI.send(history);
      startTypewriter();
    }

    // 收到一个片段：丢进队列，逐字显示
    window.chatAPI.onToken((t) => { pending += t; startTypewriter(); });

    // 流结束：等队列显示完再收尾（在 typewriter 里处理）
    window.chatAPI.onEnd(() => { streamEnded = true; });

    // 出错：把当前气泡变成错误提示
    window.chatAPI.onError((msg) => {
      pending = '';
      streamEnded = true;
      if (typingTimer) { clearInterval(typingTimer); typingTimer = null; }
      if (liveBubble) {
        liveBubble.classList.remove('typing');
        liveBubble.classList.add('error');
        liveBubble.textContent = '⚠️ ' + msg;
        liveBubble = null;
      } else {
        addBubble('pet', '⚠️ ' + msg).classList.add('error');
      }
      // 这次没有有效回复，把刚加进历史的用户消息留着，方便配置好后重发
      setBusy(false);
    });

    sendBtn.addEventListener('click', send);
    document.getElementById('gear').addEventListener('click', () => window.chatAPI.openSettings());

    // 回车发送，Shift+回车换行
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    // 输入框随内容自动长高
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 100) + 'px';
    });

    // 开场白（不进对话历史）
    addBubble('pet', '你好呀，想聊点什么？');
    input.focus();
  </script>
</body>
</html>
