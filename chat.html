<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; }
    :root {
      --accent: #6172f3;          /* 靛紫强调色 */
      --accent2: #8b7cf6;
      --text: #2b2b3a;
      --muted: #9aa0b4;
      --card: #ffffff;
      --shadow: 0 4px 16px rgba(90, 90, 170, 0.10);
    }
    html, body {
      margin: 0;
      height: 100%;
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
      color: var(--text);
      /* 淡紫 -> 淡蓝 渐变背景 */
      background: linear-gradient(180deg, #f4f2fe 0%, #eef1fe 50%, #e9f1ff 100%);
    }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* 顶部标题栏：头像 + 名字，可拖动窗口 */
    .header {
      -webkit-app-region: drag;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      height: 58px;
      padding-top: 6px;            /* 给 Mac 红绿灯按钮留空间 */
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(120, 120, 200, 0.10);
    }
    .header img {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #fff;
      box-shadow: var(--shadow);
      image-rendering: pixelated;
    }
    .header .name {
      font-size: 16px; font-weight: 700;
      background: linear-gradient(120deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* 消息区 */
    .messages {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .row { display: flex; }
    .row.me { justify-content: flex-end; }
    .row.pet { justify-content: flex-start; }

    .bubble {
      max-width: 74%;
      padding: 11px 15px;
      border-radius: 20px;
      font-size: 15px;
      line-height: 1.4;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .me .bubble {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border-bottom-right-radius: 6px;
      box-shadow: 0 4px 14px rgba(97, 114, 243, 0.28);
    }
    .pet .bubble {
      background: var(--card);
      color: var(--text);
      border-bottom-left-radius: 6px;
      box-shadow: var(--shadow);
    }
    .pet .bubble.error { background: #fdecef; color: #d23b5a; }

    /* 头像右侧的设置按钮 */
    .gear {
      -webkit-app-region: no-drag;
      position: absolute; right: 14px;
      border: none; background: none; cursor: pointer;
      font-size: 16px; color: var(--muted); opacity: 0.85;
    }
    .gear:hover { color: var(--accent); opacity: 1; }

    /* 正在输入的小圆点 */
    .typing { display: flex; gap: 4px; align-items: center; padding: 12px 14px; }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
      animation: blink 1.2s infinite both;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 60%, 100% { opacity: 0.25; } 30% { opacity: 1; } }

    /* 底部输入栏 */
    .composer {
      flex: 0 0 auto;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      padding: 12px 14px 14px;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(120, 120, 200, 0.10);
    }
    #input {
      flex: 1 1 auto;
      resize: none;
      max-height: 100px;
      min-height: 40px;
      padding: 10px 15px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      background: #fff;
      border: 1px solid transparent;
      border-radius: 22px;
      outline: none;
      box-shadow: var(--shadow);
    }
    #input::placeholder { color: var(--muted); }
    #input:focus { border-color: var(--accent); }
    #send {
      flex: 0 0 auto;
      width: 40px; height: 40px;
      border: none; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 18px; cursor: pointer;
      box-shadow: 0 4px 12px rgba(97, 114, 243, 0.32);
    }
    #send:disabled { background: #c7cbe0; box-shadow: none; cursor: default; }

    /* 联网搜索开关 */
    #web {
      flex: 0 0 auto;
      width: 40px; height: 40px;
      border: none; border-radius: 50%;
      background: #fff; color: var(--muted);
      font-size: 16px; cursor: pointer;
      box-shadow: var(--shadow);
    }
    #web.on { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  </style>
</head>
<body>
  <div class="header">
    <img id="avatar" alt="" />
    <span class="name" id="petName">小鸡毛</span>
    <button class="gear" id="gear" title="设置">⚙</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="composer">
    <button id="web" class="on" title="联网搜索（开/关）">🌐</button>
    <textarea id="input" rows="1" placeholder="发消息…"></textarea>
    <button id="send">↑</button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const webBtn = document.getElementById('web');

    // 联网搜索开关，默认开启
    let webEnabled = true;
    webBtn.addEventListener('click', () => {
      webEnabled = !webEnabled;
      webBtn.classList.toggle('on', webEnabled);
    });

    // 人设随主题变化（content 在拿到主题后填入）
    const SYSTEM = { role: 'system', content: '' };
    let history = [SYSTEM];

    // 应用主题：头像、名字、AI 人设
    const avatarEl = document.getElementById('avatar');
    const nameEl = document.getElementById('petName');
    function applyTheme(t) {
      if (!t) return;
      avatarEl.src = t.dir + '/frames/wave/01.png';
      nameEl.textContent = t.name;
      SYSTEM.content = t.persona;   // history[0] 指向同一对象，自动更新
    }
    window.chatAPI.getTheme().then(applyTheme);
    window.chatAPI.onTheme(applyTheme);

    function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

    // 创建一个气泡，返回 .bubble 元素；dots=true 时先显示等待中的小圆点
    function addBubble(who, text, dots) {
      const row = document.createElement('div');
      row.className = 'row ' + who;
      const b = document.createElement('div');
      b.className = 'bubble';
      if (dots) {
        b.classList.add('typing');
        b.innerHTML = '<span></span><span></span><span></span>';
      } else {
        b.textContent = text || '';
      }
      row.appendChild(b);
      messagesEl.appendChild(row);
      scrollToBottom();
      return b;
    }

    // ---- 打字机：逐字把收到的内容显示出来 ----
    let typingTimer = null;
    let pending = '';       // 待显示的字符
    let liveBubble = null;  // 当前正在打字的气泡
    let liveText = '';      // 已显示的文本
    let streamEnded = false;

    function startTypewriter() {
      if (typingTimer) return;
      typingTimer = setInterval(() => {
        if (pending.length > 0) {
          liveText += pending[0];
          pending = pending.slice(1);
          liveBubble.classList.remove('typing');
          liveBubble.textContent = liveText;   // 第一个字会自动清掉小圆点
          scrollToBottom();
        } else if (streamEnded) {
          clearInterval(typingTimer);
          typingTimer = null;
          history.push({ role: 'assistant', content: liveText });
          liveBubble = null;
          setBusy(false);
        }
      }, 18);
    }

    function setBusy(busy) {
      input.disabled = busy;
      sendBtn.disabled = busy;
      if (!busy) input.focus();
    }

    function send() {
      const text = input.value.trim();
      if (!text || sendBtn.disabled) return;

      addBubble('me', text);
      history.push({ role: 'user', content: text });
      input.value = '';
      input.style.height = 'auto';
      setBusy(true);

      // 准备打字目标气泡（先显示等待小圆点）
      liveBubble = addBubble('pet', '', true);
      liveText = '';
      pending = '';
      streamEnded = false;

      window.chatAPI.send({ messages: history, web: webEnabled });
      startTypewriter();
    }

    // 收到一个片段：丢进队列，逐字显示
    window.chatAPI.onToken((t) => { pending += t; startTypewriter(); });

    // 流结束：等队列显示完再收尾（在 typewriter 里处理）
    window.chatAPI.onEnd(() => { streamEnded = true; });

    // 出错：把当前气泡变成错误提示
    window.chatAPI.onError((msg) => {
      pending = '';
      streamEnded = true;
      if (typingTimer) { clearInterval(typingTimer); typingTimer = null; }
      if (liveBubble) {
        liveBubble.classList.remove('typing');
        liveBubble.classList.add('error');
        liveBubble.textContent = '⚠️ ' + msg;
        liveBubble = null;
      } else {
        addBubble('pet', '⚠️ ' + msg).classList.add('error');
      }
      // 这次没有有效回复，把刚加进历史的用户消息留着，方便配置好后重发
      setBusy(false);
    });

    sendBtn.addEventListener('click', send);
    document.getElementById('gear').addEventListener('click', () => window.chatAPI.openSettings());

    // 回车发送，Shift+回车换行
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    // 输入框随内容自动长高
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 100) + 'px';
    });

    // 开场白（不进对话历史）
    addBubble('pet', '你好呀，想聊点什么？');
    input.focus();
  </script>
</body>
</html>
