<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
      background: #fff;
      color: #000;
    }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* 顶部标题栏：头像 + 名字，可拖动窗口 */
    .header {
      -webkit-app-region: drag;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 56px;
      padding-top: 6px;            /* 给 Mac 红绿灯按钮留空间 */
      border-bottom: 1px solid #e5e5e5;
      background: rgba(250, 250, 250, 0.9);
      backdrop-filter: blur(10px);
    }
    .header img {
      width: 28px;
      height: 28px;
      image-rendering: pixelated;
    }
    .header .name { font-size: 15px; font-weight: 600; }

    /* 消息区 */
    .messages {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #fff;
    }

    .row { display: flex; }
    .row.me { justify-content: flex-end; }
    .row.pet { justify-content: flex-start; }

    .bubble {
      max-width: 72%;
      padding: 8px 12px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.35;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .me .bubble {
      background: #0b93f6;          /* iMessage 蓝 */
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .pet .bubble {
      background: #e9e9eb;          /* iMessage 灰 */
      color: #000;
      border-bottom-left-radius: 4px;
    }

    /* 正在输入的小圆点 */
    .typing { display: flex; gap: 3px; align-items: center; padding: 10px 12px; }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%; background: #9a9a9f;
      animation: blink 1.2s infinite both;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }

    /* 底部输入栏 */
    .composer {
      flex: 0 0 auto;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      padding: 10px 12px;
      border-top: 1px solid #e5e5e5;
      background: #fafafa;
    }
    #input {
      flex: 1 1 auto;
      resize: none;
      max-height: 100px;
      min-height: 36px;
      padding: 8px 12px;
      font-size: 15px;
      font-family: inherit;
      border: 1px solid #d0d0d5;
      border-radius: 18px;
      outline: none;
    }
    #input:focus { border-color: #0b93f6; }
    #send {
      flex: 0 0 auto;
      width: 36px; height: 36px;
      border: none; border-radius: 50%;
      background: #0b93f6; color: #fff;
      font-size: 18px; cursor: pointer;
    }
    #send:disabled { background: #c4c4c9; cursor: default; }
  </style>
</head>
<body>
  <div class="header">
    <img src="assets/little-mao-puppy/frames/wave/01.png" alt="" />
    <span class="name">小鸡毛</span>
  </div>

  <div class="messages" id="messages"></div>

  <div class="composer">
    <textarea id="input" rows="1" placeholder="发消息…"></textarea>
    <button id="send">↑</button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addBubble(text, who) {
      const row = document.createElement('div');
      row.className = 'row ' + who;
      const b = document.createElement('div');
      b.className = 'bubble';
      b.textContent = text;
      row.appendChild(b);
      messagesEl.appendChild(row);
      scrollToBottom();
    }

    // 显示"正在输入"，返回一个移除它的函数
    function showTyping() {
      const row = document.createElement('div');
      row.className = 'row pet';
      row.innerHTML = '<div class="bubble typing"><span></span><span></span><span></span></div>';
      messagesEl.appendChild(row);
      scrollToBottom();
      return () => row.remove();
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;
      addBubble(text, 'me');
      input.value = '';
      input.style.height = 'auto';

      const removeTyping = showTyping();
      // 问主进程要回复（现在固定返回"我收到啦"）
      const reply = await window.chatAPI.send(text);
      removeTyping();
      addBubble(reply, 'pet');
    }

    sendBtn.addEventListener('click', send);

    // 回车发送，Shift+回车换行
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    // 输入框随内容自动长高
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 100) + 'px';
    });

    // 开场白
    addBubble('你好呀，想聊点什么？', 'pet');
    input.focus();
  </script>
</body>
</html>
