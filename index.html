<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    /* 透明背景 + 撑满窗口 + 居中 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #pet {
      width: 160px;
      height: 160px;
      /* 像素风：放大时保持锐利，不要模糊 */
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      -webkit-user-select: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* 说话气泡：浮在窗口上方中间 */
    #bubble {
      position: absolute;
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 150px;
      padding: 4px 10px;
      background: #fff;
      color: #333;
      font: 13px/1.3 -apple-system, "PingFang SC", sans-serif;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.25);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }
    #bubble.show { opacity: 1; }
    /* 气泡下方的小三角 */
    #bubble::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -5px;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #fff;
      border-bottom: 0;
    }
  </style>
</head>
<body>
  <div id="bubble"></div>
  <img id="pet" alt="pet" />

  <script>
    const pet = document.getElementById('pet');
    const bubble = document.getElementById('bubble');
    const BASE = 'assets/little-mao-puppy/frames/';

    // 生成帧路径列表，例如 frames('scratch', 6) -> [.../scratch/01.png, ...]
    function frames(name, count) {
      const list = [];
      for (let i = 1; i <= count; i++) {
        list.push(BASE + name + '/' + String(i).padStart(2, '0') + '.png');
      }
      return list;
    }

    // 动画：待机(scratch)、走路(walk)、完成(cheer，一次性)
    const ANIMS = {
      idle: { list: frames('scratch', 6), fps: 8 },
      walk: { list: frames('walk', 8), fps: 10 },
      cheer: { list: frames('cheer', 5), fps: 10 },
    };

    // 预加载所有帧，避免切换时闪烁
    Object.values(ANIMS).forEach((a) =>
      a.list.forEach((src) => { const im = new Image(); im.src = src; })
    );

    let timer = null;
    let currentAnim = null;
    let idx = 0;
    let paused = false;

    function startTimer() {
      const { list, fps } = ANIMS[currentAnim];
      clearInterval(timer);
      timer = setInterval(() => {
        idx = (idx + 1) % list.length;
        pet.src = list[idx];
      }, 1000 / fps);
    }

    function play(anim) {
      if (anim === currentAnim) return; // 已经在播了就不重置
      currentAnim = anim;
      idx = 0;
      pet.src = ANIMS[anim].list[0];
      if (!paused) startTimer();
    }

    // 朝向：素材默认朝左，朝右时才水平翻转
    function setFacing(facing) {
      pet.style.transform = facing === 'right' ? 'scaleX(-1)' : 'scaleX(1)';
    }

    // 一次性动画（如完成时的 cheer）：播一遍后回到待机；播放期间忽略走动指令
    let oneShotActive = false;
    function playOnce(name, repeats = 2) {
      const a = ANIMS[name];
      if (!a) return;
      oneShotActive = true;
      clearInterval(timer);
      const total = a.list.length * repeats;
      let n = 0;
      pet.src = a.list[0];
      const t = setInterval(() => {
        n++;
        if (n >= total) {
          clearInterval(t);
          oneShotActive = false;
          currentAnim = null;   // 强制重新进入待机
          play('idle');
          return;
        }
        pet.src = a.list[n % a.list.length];
      }, 1000 / a.fps);
    }

    // 收主进程的指令（一次性动画期间不打断）
    window.petAPI.onState(({ anim, facing }) => {
      if (oneShotActive) return;
      play(anim);
      setFacing(facing);
    });

    // 气泡：ms>0 自动消失，ms=0 常驻，空文本则隐藏
    let bubbleTimer = null;
    function showBubble(text, ms) {
      clearTimeout(bubbleTimer);
      if (!text) { bubble.classList.remove('show'); return; }
      bubble.textContent = text;
      bubble.classList.add('show');
      if (ms > 0) bubbleTimer = setTimeout(() => bubble.classList.remove('show'), ms);
    }

    // 打招呼：2.5 秒后消失
    window.petAPI.onSay((text) => showBubble(text, 2500));

    // Claude Code 状态气泡
    window.petAPI.onStatus(({ text, ms }) => showBubble(text, ms));

    // 一次性动画
    window.petAPI.onPlay((name) => playOnce(name));

    // 暂停 / 继续
    window.petAPI.onPause((p) => {
      paused = p;
      if (paused) {
        clearInterval(timer);     // 停在当前帧
      } else if (currentAnim) {
        startTimer();             // 从当前帧继续
      }
    });

    // ---- 鼠标拖动（只响应左键，右键留给菜单）----
    let dragging = false;
    let offX = 0, offY = 0;   // 抓取点相对窗口左上角的位置

    pet.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;     // 只左键
      dragging = true;
      offX = e.clientX;
      offY = e.clientY;
      window.petAPI.setDragging(true);
      e.preventDefault();
    });

    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      // screenX/Y 是屏幕全局坐标；减去抓取偏移 = 窗口左上角应在的位置
      window.petAPI.moveTo(e.screenX - offX, e.screenY - offY);
    });

    window.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      window.petAPI.setDragging(false);
    });

    // 双击桌宠打开设置面板
    pet.addEventListener('dblclick', () => window.petAPI.openSettings());

    // 鼠标悬停时停下，移开继续
    pet.addEventListener('mouseenter', () => window.petAPI.setHover(true));
    pet.addEventListener('mouseleave', () => window.petAPI.setHover(false));

    // 万一消息还没来，先默认待机
    play('idle');
  </script>
</body>
</html>
