<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #1c1c1e;
      --text: #f2f2f7;
      --muted: #8e8e93;
      --field: #2c2c2e;
      --blue: #0a84ff;
    }
    html, body {
      margin: 0; height: 100%;
      font-family: -apple-system, "PingFang SC", sans-serif;
      background: var(--bg); color: var(--text);
    }
    .titlebar {
      -webkit-app-region: drag;
      height: 38px;
    }
    .body { padding: 4px 24px 24px; }
    h1 { font-size: 17px; margin: 0 0 4px; }
    .hint { font-size: 12px; color: var(--muted); margin: 0 0 16px; }
    label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 5px; }
    input {
      width: 100%; padding: 9px 12px; font-size: 13px;
      color: var(--text); background: var(--field);
      border: 1px solid transparent; border-radius: 10px; outline: none;
    }
    input::placeholder { color: var(--muted); }
    input:focus { border-color: var(--blue); }
    .row-btns { margin-top: 22px; display: flex; justify-content: flex-end; gap: 10px; }
    button {
      padding: 9px 18px; font-size: 13px; border-radius: 10px; cursor: pointer; border: none;
    }
    #cancel { background: #3a3a3c; color: var(--text); }
    #save { background: var(--blue); color: #fff; }
    #status { font-size: 12px; color: #30d158; margin-top: 12px; height: 16px; }
  </style>
</head>
<body>
  <div class="titlebar"></div>
  <div class="body">
    <h1>AI 设置（OpenRouter）</h1>
    <p class="hint">配置保存在本地，不会上传，也不会进入 Git。</p>

    <label>API Key</label>
    <input id="apiKey" type="password" placeholder="sk-or-..." />

    <label>模型名称</label>
    <input id="model" type="text" placeholder="anthropic/claude-haiku-4.5" />

    <label>接口地址</label>
    <input id="baseURL" type="text" placeholder="https://openrouter.ai/api/v1" />

    <div class="row-btns">
      <button id="cancel">取消</button>
      <button id="save">保存</button>
    </div>
    <div id="status"></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    // 载入已有配置
    (async () => {
      const cfg = await window.settingsAPI.get();
      $('apiKey').value = cfg.apiKey || '';
      $('model').value = cfg.model || '';
      $('baseURL').value = cfg.baseURL || '';
    })();

    $('save').addEventListener('click', async () => {
      await window.settingsAPI.save({
        apiKey: $('apiKey').value.trim(),
        model: $('model').value.trim(),
        baseURL: $('baseURL').value.trim(),
      });
      $('status').textContent = '已保存 ✓';
      setTimeout(() => window.settingsAPI.close(), 600);
    });

    $('cancel').addEventListener('click', () => window.settingsAPI.close());
  </script>
</body>
</html>
