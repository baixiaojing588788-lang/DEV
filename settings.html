<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; }
    :root {
      --accent: #6172f3;
      --accent2: #8b7cf6;
      --text: #2b2b3a;
      --muted: #9aa0b4;
      --shadow: 0 4px 16px rgba(90, 90, 170, 0.10);
    }
    html, body {
      margin: 0; height: 100%;
      font-family: -apple-system, "PingFang SC", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f4f2fe 0%, #eef1fe 50%, #e9f1ff 100%);
    }
    .titlebar {
      -webkit-app-region: drag;
      height: 38px;
    }
    .body { padding: 4px 24px 24px; }
    h1 {
      font-size: 17px; margin: 0 0 4px;
      background: linear-gradient(120deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hint { font-size: 12px; color: var(--muted); margin: 0 0 16px; }
    label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 5px; }
    input {
      width: 100%; padding: 10px 13px; font-size: 13px;
      color: var(--text); background: #fff;
      border: 1px solid transparent; border-radius: 12px; outline: none;
      box-shadow: var(--shadow);
    }
    input::placeholder { color: var(--muted); }
    input:focus { border-color: var(--accent); }
    .row-btns { margin-top: 22px; display: flex; justify-content: flex-end; gap: 10px; }
    button {
      padding: 9px 18px; font-size: 13px; border-radius: 12px; cursor: pointer; border: none;
    }
    #cancel { background: #fff; color: var(--text); box-shadow: var(--shadow); }
    #save {
      background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff;
      box-shadow: 0 4px 12px rgba(97, 114, 243, 0.32);
    }
    #status { font-size: 12px; color: #2bb673; margin-top: 12px; height: 16px; }
  </style>
</head>
<body>
  <div class="titlebar"></div>
  <div class="body">
    <h1>AI 设置（OpenRouter）</h1>
    <p class="hint">配置保存在本地，不会上传，也不会进入 Git。</p>

    <label>API Key</label>
    <input id="apiKey" type="password" placeholder="sk-or-..." />

    <label>模型名称</label>
    <input id="model" type="text" placeholder="anthropic/claude-haiku-4.5" />

    <label>接口地址</label>
    <input id="baseURL" type="text" placeholder="https://openrouter.ai/api/v1" />

    <div class="row-btns">
      <button id="cancel">取消</button>
      <button id="save">保存</button>
    </div>
    <div id="status"></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    // 载入已有配置
    (async () => {
      const cfg = await window.settingsAPI.get();
      $('apiKey').value = cfg.apiKey || '';
      $('model').value = cfg.model || '';
      $('baseURL').value = cfg.baseURL || '';
    })();

    $('save').addEventListener('click', async () => {
      await window.settingsAPI.save({
        apiKey: $('apiKey').value.trim(),
        model: $('model').value.trim(),
        baseURL: $('baseURL').value.trim(),
      });
      $('status').textContent = '已保存 ✓';
      setTimeout(() => window.settingsAPI.close(), 600);
    });

    $('cancel').addEventListener('click', () => window.settingsAPI.close());
  </script>
</body>
</html>
