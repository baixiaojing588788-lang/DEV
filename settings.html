<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; height: 100%;
      font-family: -apple-system, "PingFang SC", sans-serif;
      background: #fff; color: #111;
    }
    .titlebar {
      -webkit-app-region: drag;
      height: 38px;
    }
    .body { padding: 4px 22px 22px; }
    h1 { font-size: 16px; margin: 0 0 4px; }
    .hint { font-size: 12px; color: #888; margin: 0 0 16px; }
    label { display: block; font-size: 13px; font-weight: 600; margin: 12px 0 4px; }
    input {
      width: 100%; padding: 8px 10px; font-size: 13px;
      border: 1px solid #d0d0d5; border-radius: 8px; outline: none;
    }
    input:focus { border-color: #0b93f6; }
    .row-btns { margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px; }
    button {
      padding: 8px 16px; font-size: 13px; border-radius: 8px; cursor: pointer; border: none;
    }
    #cancel { background: #eee; color: #333; }
    #save { background: #0b93f6; color: #fff; }
    #status { font-size: 12px; color: #2a8c3c; margin-top: 10px; height: 16px; }
  </style>
</head>
<body>
  <div class="titlebar"></div>
  <div class="body">
    <h1>AI 设置（OpenRouter）</h1>
    <p class="hint">配置保存在本地，不会上传，也不会进入 Git。</p>

    <label>API Key</label>
    <input id="apiKey" type="password" placeholder="sk-or-..." />

    <label>模型名称</label>
    <input id="model" type="text" placeholder="anthropic/claude-3.5-sonnet" />

    <label>接口地址</label>
    <input id="baseURL" type="text" placeholder="https://openrouter.ai/api/v1" />

    <div class="row-btns">
      <button id="cancel">取消</button>
      <button id="save">保存</button>
    </div>
    <div id="status"></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    // 载入已有配置
    (async () => {
      const cfg = await window.settingsAPI.get();
      $('apiKey').value = cfg.apiKey || '';
      $('model').value = cfg.model || '';
      $('baseURL').value = cfg.baseURL || '';
    })();

    $('save').addEventListener('click', async () => {
      await window.settingsAPI.save({
        apiKey: $('apiKey').value.trim(),
        model: $('model').value.trim(),
        baseURL: $('baseURL').value.trim(),
      });
      $('status').textContent = '已保存 ✓';
      setTimeout(() => window.settingsAPI.close(), 600);
    });

    $('cancel').addEventListener('click', () => window.settingsAPI.close());
  </script>
</body>
</html>
